services:
  # Backend service
  - type: web
    name: meditrack-server
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: MONGO_URI
        sync: false # User must set this in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false # User must set this after frontend is deployed

  # Frontend service
  - type: static_site
    name: meditrack-client
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        sync: false # User must set this to the backend URL
